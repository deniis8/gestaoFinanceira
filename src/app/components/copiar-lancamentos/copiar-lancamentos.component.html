<div class="overlay" (click)="fecharPopup()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Copiar Lançamentos</h2>
      <button class="btn-close" (click)="fecharPopup()" aria-label="Fechar">
        <span>&times;</span>
      </button>
    </div>

    <div class="modal-body">
      <div *ngIf="lancamentos.length > 0; else noLancamentos">
        <table class="table table-striped table-bordered align-middle shadow-sm">
          <thead class="table-dark">
            <tr>
              <th><input type="checkbox" (change)="selecionarTodos($event)" /></th>
              <th>Data Hora</th>
              <th>Valor</th>
              <th>Descrição</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let lancamento of lancamentos">
              <td><input type="checkbox" [checked]="isSelecionado(lancamento.id!)" (change)="toggleSelecao(lancamento.id!)" /></td>
              <td>{{lancamento.dataHora | date: "dd/MM/yyyy HH:mm"}}</td>
              <td>{{ lancamento.valor | formatValor }}</td>
              <td>{{lancamento.descricao}}</td>
              <td>{{lancamento.status}}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <ng-template #noLancamentos>
        <div class="no-data">
          <p>Nenhum lançamento encontrado</p>
        </div>
      </ng-template>
    </div>

    <div class="modal-footer">
      <button class="btn btn-primary" 
        [disabled]="selectedLancamentos.length === 0"
        (click)="copiarSelecionados()">
        Copiar Selecionados ({{ selectedLancamentos.length }})
      </button>
    </div>
  </div>
</div>
